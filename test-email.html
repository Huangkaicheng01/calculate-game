<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailJS 测试</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        body { font-family: system-ui; max-width: 400px; margin: 60px auto; padding: 20px; }
        button { font-size: 18px; padding: 14px 28px; border: none; border-radius: 12px; cursor: pointer; }
        .send { background: #e85d4c; color: #fff; }
        .send:disabled { opacity: .5; cursor: default; }
        .status { margin-top: 16px; font-weight: 700; min-height: 24px; }
        .ok { color: #3aad7a; }
        .err { color: #e85d4c; }
    </style>
</head>
<body>
    <h2>EmailJS 发送测试</h2>
    <p>点击下面的按钮测试发送邮件到 ronald.huang@aigens.com</p>
    <button class="send" onclick="test()" id="btn">发送测试邮件</button>
    <div class="status" id="status"></div>

    <script>
        emailjs.init("hhj6Imrb-moKG6fI4");

        async function test() {
            const btn = document.getElementById("btn");
            const st = document.getElementById("status");
            btn.disabled = true;
            btn.textContent = "发送中...";
            st.textContent = "";
            st.className = "status";

            try {
                const resp = await emailjs.send("service_tp6h1sf", "template_920jcfo", {
                    to_email: "ronald.huang@aigens.com",
                    subject: "学科闯关赛 — 浏览器端测试",
                    message: "如果你看到这封邮件，说明 EmailJS 在浏览器端配置完全正确！",
                    quiz_accuracy: "测试",
                    total_score: "测试",
                    tablet_minutes: "测试",
                    photo_count: "0",
                    audio_count: "0",
                });
                st.textContent = "✅ 发送成功！HTTP " + resp.status + " — 请检查邮箱";
                st.className = "status ok";
                btn.textContent = "已发送 ✅";
            } catch (err) {
                st.textContent = "❌ 发送失败：" + (err.message || JSON.stringify(err));
                st.className = "status err";
                btn.disabled = false;
                btn.textContent = "重试";
            }
        }
    </script>
</body>
</html>
