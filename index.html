<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学问答赛</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="fireworks" aria-hidden="true"></canvas>

    <main class="app">
        <header class="brand">
            <h1 id="brand-title">数学问答赛</h1>
            <p class="tagline">每次 5 题 · 答对有烟花</p>
        </header>

        <section id="start-screen" class="screen">
            <p class="intro">选一个模式开始挑战吧！</p>
            <div class="mode-list">
                <button type="button" class="mode-btn" data-mode="table">
                    <span class="mode-name">九九乘法表</span>
                    <span class="mode-desc">一位数 × 一位数 · 选择题</span>
                </button>
                <button type="button" class="mode-btn" data-mode="two-digit">
                    <span class="mode-name">二位数 × 一位数</span>
                    <span class="mode-desc">自己填入答案 · 系统判分</span>
                </button>
                <button type="button" class="mode-btn" data-mode="division">
                    <span class="mode-name">除法练习</span>
                    <span class="mode-desc">能整除 · 自己填入答案</span>
                </button>
            </div>
        </section>

        <section id="quiz-screen" class="screen hidden">
            <div class="progress">
                <span id="progress-text">第 1 / 5 题</span>
                <div class="progress-bar"><div id="progress-fill"></div></div>
            </div>
            <p id="question" class="question">3 × 4 = ?</p>
            <div id="options" class="options"></div>
            <form id="answer-form" class="answer-form hidden">
                <input
                    id="answer-input"
                    type="number"
                    inputmode="numeric"
                    autocomplete="off"
                    placeholder="填入答案"
                    aria-label="填入答案"
                >
                <button type="submit" class="btn primary submit-btn">提交</button>
            </form>
            <p id="feedback" class="feedback" aria-live="polite"></p>
        </section>

        <section id="result-screen" class="screen hidden">
            <p id="result-score" class="result-score">你答对了 5 / 5 题！</p>
            <p id="result-msg" class="result-msg">太厉害了！</p>
            <div class="result-actions">
                <button type="button" id="restart-btn" class="btn primary">再来一局</button>
                <button type="button" id="home-btn" class="btn ghost">换模式</button>
            </div>
        </section>
    </main>

    <script src="game.js"></script>
</body>
</html>
