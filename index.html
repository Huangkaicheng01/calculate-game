<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学科闯关赛</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="fireworks" aria-hidden="true"></canvas>

    <main class="app">
        <header class="brand">
            <h1 id="brand-title">学科闯关赛</h1>
            <p class="tagline">共 5 关 · 每关 5 题 · 答对 4 题得 1 分 · 满分共可领平板 70 分钟</p>
        </header>

        <div id="stats-bar" class="stats-bar">
            <div class="stat">
                <span class="stat-label">得分</span>
                <span id="stat-points">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">平板时间</span>
                <span id="stat-minutes">0 分钟</span>
            </div>
        </div>

        <section id="map-screen" class="screen">
            <p class="intro">共 5 关，闯过才能解锁下一关。答对至少 4 题得 1 分，每分可换 14 分钟平板，最多领取 70 分钟。</p>
            <div id="level-list" class="level-list"></div>
            <button type="button" id="reset-btn" class="btn ghost reset-btn">重新开始闯关</button>
        </section>

        <section id="quiz-screen" class="screen hidden">
            <div class="progress">
                <span id="progress-text">第 1 / 5 题</span>
                <div class="progress-bar"><div id="progress-fill"></div></div>
            </div>
            <p id="question" class="question">36 × 47 = ?</p>
            <div id="options" class="options"></div>
            <form id="answer-form" class="answer-form hidden">
                <input
                    id="answer-input"
                    type="number"
                    inputmode="numeric"
                    autocomplete="off"
                    placeholder="填入答案"
                    aria-label="填入答案"
                >
                <button type="submit" class="btn primary submit-btn">提交</button>
            </form>
            <p id="feedback" class="feedback" aria-live="polite"></p>
        </section>

        <section id="result-screen" class="screen hidden">
            <p id="result-title" class="result-score">本关通过！</p>
            <p id="result-detail" class="result-msg">答对 4 / 5 题</p>
            <div id="result-reward" class="result-reward"></div>
            <div class="result-totals">
                <p>累计得分：<strong id="result-points">0</strong></p>
                <p>可使用平板：<strong id="result-minutes">0 分钟</strong></p>
            </div>
            <div class="result-actions">
                <button type="button" id="next-btn" class="btn primary">下一关</button>
                <button type="button" id="retry-btn" class="btn primary">再闯一次</button>
                <button type="button" id="home-btn" class="btn ghost">返回地图</button>
            </div>
        </section>
    </main>

    <script src="game.js"></script>
</body>
</html>
