<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学科闯关赛</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <canvas id="fireworks" aria-hidden="true"></canvas>

    <main class="app">
        <header class="brand">
            <h1 id="brand-title">学科闯关赛</h1>
            <p id="today-date" class="today-date"></p>
            <p class="tagline">共 6 关 · 自由选择关卡 · 每关通关得 1 分 · 满分共可领平板 30 分钟</p>
        </header>

        <div id="stats-bar" class="stats-bar">
            <div class="stat">
                <span class="stat-label">得分</span>
                <span id="stat-points">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">平板时间</span>
                <span id="stat-minutes">0 分钟</span>
            </div>
        </div>

        <section id="map-screen" class="screen">
            <p class="intro">共 6 关，所有关卡自由选择，无需按顺序闯关。通关得 1 分，每分可换 6 分钟平板或者小度时间，最多领取 30 分钟。已通关的关卡不可重复答题。</p>
            <div id="level-list" class="level-list"></div>
            <button type="button" id="reset-btn" class="btn ghost reset-btn">重新开始闯关</button>
        </section>

        <section id="quiz-screen" class="screen hidden">
            <div class="progress">
                <span id="progress-text">第 1 / 5 题</span>
                <div class="progress-bar"><div id="progress-fill"></div></div>
            </div>
            <p id="question" class="question">36 × 47 = ?</p>
            <div id="options" class="options"></div>
            <form id="answer-form" class="answer-form hidden">
                <input
                    id="answer-input"
                    type="number"
                    inputmode="numeric"
                    autocomplete="off"
                    placeholder="填入答案"
                    aria-label="填入答案"
                >
                <button type="submit" class="btn primary submit-btn">提交</button>
            </form>
            <p id="feedback" class="feedback" aria-live="polite"></p>
            <button type="button" id="quiz-back-btn" class="btn ghost quiz-back">返回地图</button>
        </section>

        <section id="result-screen" class="screen hidden">
            <p id="result-title" class="result-score">本关通过！</p>
            <p id="result-detail" class="result-msg">答对 4 / 5 题</p>
            <div id="result-reward" class="result-reward"></div>
            <div class="result-totals">
                <p>累计得分：<strong id="result-points">0</strong></p>
                <p>可使用平板：<strong id="result-minutes">0 分钟</strong></p>
            </div>
            <div class="result-actions">
                <button type="button" id="next-btn" class="btn primary">下一关</button>
                <button type="button" id="retry-btn" class="btn primary">再闯一次</button>
                <button type="button" id="home-btn" class="btn ghost">返回地图</button>
            </div>
            <div class="email-send-area hidden">
                <button type="button" id="send-email-btn" class="btn primary full-width">
                    📧 提交结果到爸爸邮箱
                </button>
                <p id="email-send-status" class="email-status"></p>
            </div>
        </section>

        <section id="collection-screen" class="screen hidden">
            <div class="collection-progress">
                <span id="collection-progress-text">已收集 0 / 3 条好词好句</span>
                <div class="progress-bar"><div id="collection-progress-fill"></div></div>
            </div>
            <div class="collection-actions">
                <button type="button" id="camera-btn" class="btn collection-action-btn">
                    <span class="action-icon">📷</span>
                    <span>拍照记录</span>
                </button>
                <button type="button" id="record-btn" class="btn collection-action-btn">
                    <span class="action-icon">🎙️</span>
                    <span id="record-btn-text">开始录音</span>
                </button>
                <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden">
            </div>
            <p id="recording-status" class="recording-status" aria-live="polite"></p>
            <audio id="audio-preview" class="hidden" controls></audio>
            <div id="collection-list" class="collection-list"></div>
            <p id="collection-feedback" class="feedback" aria-live="polite"></p>
            <div class="collection-submit-area">
                <button type="button" id="collection-submit-btn" class="btn primary" disabled>提交收集（需至少 3 条）</button>
                <button type="button" id="collection-back-btn" class="btn ghost">返回地图</button>
            </div>
        </section>
    </main>

    <script src="questions/levels.js"></script>
    <script src="questions/science.js"></script>
    <script src="questions/english.js"></script>
    <script src="game.js"></script>
</body>
</html>
